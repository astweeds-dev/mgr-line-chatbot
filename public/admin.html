<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MGR Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:#f5f5f0;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#5A4F00,#8a7f33);color:#F9E84A;padding:16px 20px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:800}
.header .badge{background:#F9E84A;color:#5A4F00;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e8e4cc;position:sticky;top:54px;z-index:40}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:700;color:#999;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s}
.tab.active{color:#5A4F00;border-bottom-color:#F9E84A;background:#FFFEF5}
.tab .count{background:#E85D3A;color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:4px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:32px;max-width:360px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center}
.login-box h2{font-size:20px;color:#5A4F00;margin-bottom:16px}
.login-box input{width:100%;padding:14px;border-radius:12px;border:1.5px solid #e8e4cc;font-size:15px;font-family:inherit;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:#F9E84A}
.login-box button{width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:800;background:#5A4F00;color:#F9E84A;border:none;cursor:pointer}

/* Orders */
.orders{padding:12px}
.order-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);border-left:4px solid #e8e4cc}
.order-card.st-received{border-left-color:#2196F3}
.order-card.st-preparing{border-left-color:#FF9800}
.order-card.st-delivering{border-left-color:#9C27B0}
.order-card.st-delivered{border-left-color:#27AE60}
.order-card.st-none{border-left-color:#ccc}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.oc-id{font-size:16px;font-weight:800;color:#5A4F00}
.oc-time{font-size:12px;color:#aaa}
.oc-status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:6px}
.oc-status.s-none{background:#f0f0f0;color:#999}
.oc-status.s-received{background:#E3F2FD;color:#1565C0}
.oc-status.s-preparing{background:#FFF3E0;color:#E65100}
.oc-status.s-delivering{background:#F3E5F5;color:#7B1FA2}
.oc-status.s-delivered{background:#E8F5E9;color:#2E7D32}
.oc-status.s-await_slip{background:#FFF8E1;color:#F57F17}
.oc-status.s-slip_sent{background:#FCE4EC;color:#C62828}
.oc-status.s-confirmed{background:#E8F5E9;color:#2E7D32}
.oc-delivery{font-size:13px;color:#5A4F00;font-weight:600;margin-bottom:4px}
.oc-summary{font-size:14px;color:#666;white-space:pre-line;margin-bottom:6px;line-height:1.5}
.oc-total{font-size:15px;font-weight:800;color:#E85D3A}
.oc-total.big{font-size:22px}
.oc-actions{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.oc-actions .btn-next{width:100%;min-height:52px;padding:12px 18px;border-radius:12px;font-size:17px;font-weight:800;border:none;cursor:pointer;font-family:inherit;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:6px}
.oc-actions .btn-next:active{transform:scale(.97)}
.btn-confirm{background:#27AE60;color:#fff}
.btn-preparing{background:#FF9800;color:#fff}
.btn-delivering{background:#9C27B0;color:#fff}
.btn-delivered{background:#27AE60;color:#fff}
.btn-received{background:#2196F3;color:#fff}
.oc-wait{color:#999;font-size:14px;padding:8px 0;text-align:center}
.eta-chips{margin-top:6px}
.eta-chips-label{font-size:12px;color:#888;margin-bottom:4px}
.eta-chip{display:inline-block;padding:8px 18px;border-radius:20px;font-size:14px;font-weight:700;border:1.5px solid #e8e4cc;background:#fff;color:#666;cursor:pointer;font-family:inherit;margin-right:6px;margin-bottom:4px;transition:all .15s}
.eta-chip.on{background:#F9E84A;color:#5A4F00;border-color:#5A4F00}
.eta-chip:active{transform:scale(.95)}
.oc-new-badge{display:inline-block;background:#E85D3A;color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;animation:pulse-badge 1.5s infinite}
@keyframes pulse-new{0%,100%{box-shadow:0 0 0 0 rgba(232,93,58,.4)}50%{box-shadow:0 0 0 10px rgba(232,93,58,0)}}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.5}}
.order-card.is-new{animation:pulse-new 1.5s infinite;border-left-color:#E85D3A}
.oc-slip{margin-top:8px}
.oc-slip img{max-width:120px;border-radius:8px;border:1px solid #e8e4cc;cursor:pointer}
.slip-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;cursor:pointer}
.slip-modal.show{display:flex}
.slip-modal img{max-width:90vw;max-height:90vh;border-radius:8px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:15px}
.refresh-btn{background:none;border:none;color:#F9E84A;font-size:14px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:8px}
.refresh-btn:hover{background:rgba(249,232,74,.15)}
.shop-toggles{display:flex;gap:6px;padding:10px 16px;background:#FFFEF5;border-bottom:1px solid #e8e4cc}
.shop-toggle{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.shop-toggle:active{transform:scale(.97)}
.shop-toggle.is-open{background:#E8F5E9;color:#2E7D32}
.shop-toggle.is-closed{background:#FDEAEA;color:#E74C3C}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#27AE60;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:#E74C3C}

/* Menu management */
.menu-section{padding:12px}
.menu-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center}
.menu-card.disabled{opacity:.5}
.mc-left{flex:1}
.mc-name{font-size:14px;font-weight:700}
.mc-cat{font-size:12px;color:#888}
.mc-price{font-size:13px;color:#5A4F00;font-weight:600}
.mc-actions{display:flex;gap:6px}
.mc-actions button{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.btn-edit-menu{background:#FFF3E0;color:#E65100}
.btn-del-menu{background:#FDEAEA;color:#E74C3C}
.btn-toggle-menu{background:#E8F5E9;color:#2E7D32}
.add-menu-btn{display:block;width:calc(100% - 24px);margin:12px auto;padding:14px;border-radius:12px;font-size:15px;font-weight:800;background:#5A4F00;color:#F9E84A;border:none;cursor:pointer}

/* Menu form modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:18px;color:#5A4F00;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:700;color:#5A4F00;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border-radius:10px;border:1.5px solid #e8e4cc;font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#F9E84A}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.btn-save{background:#27AE60;color:#fff}
.btn-cancel{background:#f0f0f0;color:#666}
.price-type-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;border:1.5px solid #e8e4cc;background:#fff;color:#666;cursor:pointer;font-family:inherit}
.price-type-btn.active{background:#F9E84A;color:#5A4F00;border-color:#5A4F00}
.price-row,.addon-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.price-row input,.addon-row input{flex:1;padding:8px;border-radius:8px;border:1.5px solid #e8e4cc;font-size:13px;font-family:inherit}
.price-row input:focus,.addon-row input:focus{outline:none;border-color:#F9E84A}
.btn-row-del{width:32px;height:32px;border-radius:8px;border:none;background:#FDEAEA;color:#E74C3C;font-size:16px;cursor:pointer;flex-shrink:0}
.btn-row-move{width:28px;height:28px;border-radius:6px;border:none;background:#f0f0f0;color:#666;font-size:14px;cursor:pointer;flex-shrink:0}
.btn-row-move:active{background:#e0e0e0;transform:scale(.9)}
.row-move-group{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.preset-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid #e8e4cc;background:#fff;color:#666;cursor:pointer;font-family:inherit}
.preset-btn:active{transform:scale(.95)}
.mc-img{width:44px;height:44px;border-radius:8px;object-fit:cover;margin-right:10px;flex-shrink:0}

/* Settings */
.settings-section{padding:12px}
.settings-card{background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.settings-card h3{font-size:15px;font-weight:800;color:#5A4F00;margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid #e8e4cc}
.sf-group{margin-bottom:12px}
.sf-group label{display:block;font-size:13px;font-weight:700;color:#5A4F00;margin-bottom:4px}
.sf-group input,.sf-group textarea{width:100%;padding:10px;border-radius:10px;border:1.5px solid #e8e4cc;font-size:14px;font-family:inherit}
.sf-group input:focus,.sf-group textarea:focus{outline:none;border-color:#F9E84A}
.sf-row{display:flex;gap:10px}
.sf-row .sf-group{flex:1}
.sf-color-preview{display:inline-block;width:24px;height:24px;border-radius:6px;vertical-align:middle;margin-left:6px;border:1px solid #ddd}
.sf-loc-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.sf-loc-item input{flex:1;padding:8px;border-radius:8px;border:1.5px solid #e8e4cc;font-size:13px;font-family:inherit}
.sf-loc-item input:focus{outline:none;border-color:#F9E84A}
.sf-loc-item button{width:32px;height:32px;border-radius:8px;border:none;background:#FDEAEA;color:#E74C3C;font-size:16px;cursor:pointer;flex-shrink:0}
.sf-add-loc{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;background:#f5f5f0;color:#5A4F00;border:1.5px dashed #ccc;cursor:pointer;font-family:inherit;width:100%}
.btn-save-settings{display:block;width:calc(100% - 24px);margin:16px auto;padding:14px;border-radius:12px;font-size:15px;font-weight:800;background:#27AE60;color:#fff;border:none;cursor:pointer}
.btn-save-settings:active{transform:scale(.98)}
.sf-media-row{display:flex;gap:8px;align-items:center}
.sf-media-preview{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1.5px solid #e8e4cc;flex-shrink:0}
.sf-upload-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:#F9E84A;color:#5A4F00;font-size:18px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>

<!-- Login -->
<div id="login-page" class="login-wrap">
  <div class="login-box">
    <h2>🔐 เข้าสู่ระบบพนักงาน</h2>
    <input type="text" id="token-input" inputmode="numeric" autocomplete="off" placeholder="ใส่รหัส PIN">
    <button onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="header">
    <h1>📊 MGR Admin</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="refresh-btn" onclick="loadOrders()">🔄 รีเฟรช</button>
      <span class="badge" id="env-badge"></span>
    </div>
  </div>
  <div class="shop-toggles" id="shop-toggles" style="display:none">
    <button class="shop-toggle is-open" id="toggle-food" onclick="toggleShop('food')">🍳 ครัว: เปิด</button>
    <button class="shop-toggle is-open" id="toggle-drinks" onclick="toggleShop('drinks')">☕ กาแฟ: เปิด</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="active" onclick="switchTab('active')">ออเดอร์ <span class="count" id="count-active">0</span></div>
    <div class="tab" data-tab="history" onclick="switchTab('history')">ประวัติ</div>
    <div class="tab" data-tab="menu" onclick="switchTab('menu')">เมนู</div>
    <div class="tab" data-tab="settings" onclick="switchTab('settings')">ตั้งค่า</div>
  </div>

  <div id="tab-active" class="orders"></div>
  <div id="tab-history" class="orders" style="display:none"></div>
  <div id="tab-menu" class="menu-section" style="display:none"></div>
  <div id="tab-settings" class="settings-section" style="display:none"></div>
</div>

<!-- Slip modal -->
<div class="slip-modal" id="slip-modal" onclick="this.classList.remove('show')">
  <img id="slip-img" src="">
</div>

<!-- Menu form modal -->
<div class="modal-overlay" id="menu-modal">
  <div class="modal-box">
    <h3 id="menu-modal-title">เพิ่มเมนู</h3>

    <!-- รูปเมนู -->
    <div class="form-group" style="text-align:center">
      <div id="mf-img-preview" style="width:100px;height:100px;border-radius:12px;background:#f0f0f0;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1.5px dashed #ccc">
        <span style="font-size:32px;color:#ccc" id="mf-img-placeholder">📷</span>
      </div>
      <button type="button" onclick="document.getElementById('mf-img-input').click()" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;background:#FFF3E0;color:#E65100;border:none;cursor:pointer">เลือกรูปเมนู</button>
      <input type="file" id="mf-img-input" accept="image/*" style="display:none" onchange="previewMenuImg(this)">
    </div>

    <div class="form-row">
      <div class="form-group"><label>ID</label><input type="number" id="mf-id"></div>
      <div class="form-group"><label>หมวด</label>
        <select id="mf-cat" onchange="onCatChange()">
          <option value="food">อาหาร</option>
          <option value="coffee">กาแฟ</option>
          <option value="milk">นม & ชา</option>
          <option value="soda">โซดา</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ชื่อ (ไทย)</label><input type="text" id="mf-nameTh" placeholder="เช่น ผัดกะเพรา"></div>
      <div class="form-group"><label>ชื่อ (EN)</label><input type="text" id="mf-nameEn" placeholder="e.g. Stir-fried Basil"></div>
    </div>

    <!-- ราคา: แบบเลือกเนื้อ หรือราคาเดียว -->
    <div class="form-group">
      <label>ราคา</label>
      <div id="mf-price-type-row" style="display:flex;gap:8px;margin-bottom:8px">
        <button type="button" class="price-type-btn active" id="pt-single" onclick="setPriceType('single')">ราคาเดียว</button>
        <button type="button" class="price-type-btn" id="pt-variant" onclick="setPriceType('variant')">แยกตามเนื้อสัตว์/ตัวเลือก</button>
      </div>
      <div id="mf-price-single">
        <input type="number" id="mf-price-default" placeholder="ราคา เช่น 70" style="width:120px">
      </div>
      <div id="mf-price-variant" style="display:none">
        <div id="mf-price-rows"></div>
        <button type="button" onclick="addPriceRow()" style="margin-top:6px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;background:#E8F5E9;color:#2E7D32;border:none;cursor:pointer">+ เพิ่มตัวเลือก</button>
      </div>
    </div>

    <!-- Addons -->
    <div class="form-group" id="mf-addons-section">
      <label>ท็อปปิ้ง / Add-ons</label>
      <div id="mf-addon-rows"></div>
      <button type="button" onclick="addAddonRow()" style="margin-top:6px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;background:#E8F5E9;color:#2E7D32;border:none;cursor:pointer">+ เพิ่ม add-on</button>
    </div>

    <!-- ระดับ (เผ็ด/หวาน) -->
    <div class="form-group" id="mf-level-section">
      <label>ระดับ (เผ็ด/หวาน)</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px" id="mf-level-presets">
        <button type="button" class="preset-btn" onclick="setLevelPreset('spicy')">🌶️ ความเผ็ด</button>
        <button type="button" class="preset-btn" onclick="setLevelPreset('sweet')">🍯 ความหวาน</button>
        <button type="button" class="preset-btn" onclick="setLevelPreset('none')">ไม่มี</button>
      </div>
      <input type="text" id="mf-levelLabel" placeholder="ชื่อ เช่น ระดับความเผ็ด" style="margin-bottom:4px">
      <div id="mf-level-tags" style="font-size:13px;color:#888;margin-top:4px"></div>
    </div>

    <div class="form-row">
      <div class="form-group"><label>ลำดับ</label><input type="number" id="mf-sortOrder" value="0"></div>
      <div class="form-group"><label>เปิดใช้</label>
        <select id="mf-enabled"><option value="1">เปิด</option><option value="0">ปิด</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMenuModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveMenu()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN = localStorage.getItem("mgr_admin_token") || "";
let orders = [];
let menuItems = [];
let curTab = "active";
let etaSel = {};       // orderId → selected ETA นาที
let prevState = {};    // orderId → last known state
let newIds = new Set();// orderIds ที่เพิ่งเข้า slip_sent (ใหม่)
let firstLoad = true;

// ==================== Web Audio (beep แจ้งเตือนออเดอร์ใหม่) ====================
let audioCtx = null;
function primeAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}
function beep() {
  try {
    if (!audioCtx) return;
    [0, 0.3].forEach(t0 => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = "sine"; o.frequency.value = 880;
      const t = audioCtx.currentTime + t0;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      o.start(t); o.stop(t + 0.24);
    });
  } catch (e) {}
}
document.addEventListener("click", primeAudio, { once: false });

const STATUS_LABELS = {
  none: "รอชำระ", received: "📋 รับแล้ว", preparing: "👨‍🍳 กำลังเตรียม",
  delivering: "🛵 กำลังส่ง", delivered: "✅ ส่งแล้ว"
};
const STATE_LABELS = {
  await_slip: "⏳ รอสลิป", slip_sent: "📸 รอยืนยัน", confirmed: "✅ ยืนยันแล้ว"
};
const CAT_LABELS = { food: "อาหาร", coffee: "กาแฟ", milk: "นม & ชา", soda: "โซดา" };

function doLogin() {
  TOKEN = document.getElementById("token-input").value.trim();
  if (!TOKEN) return;
  localStorage.setItem("mgr_admin_token", TOKEN);
  primeAudio();
  startDashboard();
}

// ==================== ตรวจจับออเดอร์ใหม่ + beep ====================
function processOrders(list) {
  orders = list;
  let hasNew = false;
  // ตรวจหาออเดอร์ที่เพิ่งเข้า slip_sent
  for (const o of list) {
    const prev = prevState[o.orderId];
    if (o.state === "slip_sent" && prev !== "slip_sent" && !firstLoad) {
      newIds.add(o.orderId);
      hasNew = true;
    }
    // ถ้าออเดอร์ไม่ใช่ slip_sent แล้ว ลบออกจาก newIds
    if (o.state !== "slip_sent") {
      newIds.delete(o.orderId);
    }
    prevState[o.orderId] = o.state;
  }
  if (hasNew) beep();
  if (firstLoad) firstLoad = false;
  renderOrders();
}

async function startDashboard() {
  try {
    const r = await api("/api/admin/orders");
    if (r.error) throw new Error(r.error);
    document.getElementById("login-page").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("env-badge").textContent = location.port === "3000" ? "DEV" : "MAIN";
    processOrders(r.orders || []);
    loadMenu();
    loadShopStatus();
  } catch (e) {
    showToast("รหัส PIN ไม่ถูกต้อง", true);
  }
}

async function api(url, opts) {
  const sep = url.includes("?") ? "&" : "?";
  const r = await fetch(url + sep + "token=" + TOKEN, opts);
  return r.json();
}

async function loadOrders() {
  const r = await api("/api/admin/orders");
  processOrders(r.orders || []);
  showToast("รีเฟรชแล้ว");
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.getElementById("tab-active").style.display = tab === "active" ? "" : "none";
  document.getElementById("tab-history").style.display = tab === "history" ? "" : "none";
  document.getElementById("tab-menu").style.display = tab === "menu" ? "" : "none";
  document.getElementById("tab-settings").style.display = tab === "settings" ? "" : "none";
  if (tab === "active" || tab === "history") renderOrders();
  if (tab === "settings") loadSettingsTab();
}

function renderOrders() {
  const active = orders.filter(o => o.state !== "confirmed" || (o.orderStatus && o.orderStatus !== "delivered" && o.orderStatus !== "none"));
  const history = orders.filter(o => !active.includes(o));

  document.getElementById("count-active").textContent = active.length;
  document.getElementById("tab-active").innerHTML = active.length
    ? active.map(o => orderCard(o, true)).join("")
    : '<div class="empty">ไม่มีออเดอร์ที่กำลังดำเนินการ</div>';
  document.getElementById("tab-history").innerHTML = history.length
    ? history.map(o => orderCard(o, false)).join("")
    : '<div class="empty">ยังไม่มีประวัติ</div>';
}

function orderCard(o, showActions) {
  const d = o.delivery || {};
  const time = o.createdAt ? new Date(o.createdAt).toLocaleString("th-TH", { timeZone: "Asia/Bangkok", hour: "2-digit", minute: "2-digit" }) : "";
  const date = o.createdAt ? new Date(o.createdAt).toLocaleDateString("th-TH", { timeZone: "Asia/Bangkok" }) : "";
  const isNew = newIds.has(o.orderId);

  let statusBadge = "";
  if (o.state === "confirmed" || o.orderStatus !== "none") {
    statusBadge = `<span class="oc-status s-${o.orderStatus}">${STATUS_LABELS[o.orderStatus] || o.orderStatus}</span>`;
  } else {
    statusBadge = `<span class="oc-status s-${o.state}">${STATE_LABELS[o.state] || o.state}</span>`;
  }

  // ปุ่มเดียว: next-step ตามสถานะ
  let actions = "";
  if (showActions) {
    if (o.state === "slip_sent") {
      // รอยืนยันชำระเงิน
      actions = `<div class="oc-actions">
        <button class="btn-next btn-confirm" onclick="confirmOrder('${o.orderId}')">✅ ยืนยันรับเงิน</button>
      </div>`;
    } else if (o.state === "await_slip") {
      actions = `<div class="oc-wait">⏳ รอลูกค้าโอนเงิน / ส่งสลิป</div>`;
    } else if (o.state === "confirmed") {
      const cur = o.orderStatus || "received";
      let nextStatus = null, btnLabel = "", btnClass = "";
      if (cur === "received" || cur === "none" || !cur) {
        nextStatus = "preparing"; btnLabel = "🍳 เริ่มทำอาหาร"; btnClass = "btn-preparing";
      } else if (cur === "preparing") {
        nextStatus = "delivering"; btnLabel = "🛵 ออกไปส่ง"; btnClass = "btn-delivering";
      } else if (cur === "delivering") {
        nextStatus = "delivered"; btnLabel = "✅ ส่งสำเร็จ"; btnClass = "btn-delivered";
      }
      if (nextStatus) {
        // ETA chips สำหรับ preparing / delivering
        let etaHtml = "";
        if (nextStatus === "preparing" || nextStatus === "delivering") {
          const sel = etaSel[o.orderId] || 0;
          etaHtml = `<div class="eta-chips">
            <div class="eta-chips-label">⏱ แจ้งลูกค้า (ไม่บังคับ):</div>
            ${[10,20,30].map(m => `<span class="eta-chip${sel===m?' on':''}" onclick="toggleEta('${o.orderId}',${m})">${m} นาที</span>`).join("")}
          </div>`;
        }
        actions = `<div class="oc-actions">
          ${etaHtml}
          <button class="btn-next ${btnClass}" onclick="updateStatus('${o.orderId}','${nextStatus}')">${btnLabel}</button>
        </div>`;
      }
    }
  }

  // สลิป
  let slip = "";
  if (o.slipUrl) {
    slip = `<div class="oc-slip"><img src="${o.slipUrl}" alt="slip" onclick="showSlip('${o.slipUrl}')"></div>`;
  }

  // แสดงยอดเงินตัวใหญ่สำหรับ slip_sent
  const totalClass = o.state === "slip_sent" ? "oc-total big" : "oc-total";
  const newBadge = isNew ? `<span class="oc-new-badge">🔔 ใหม่!</span>` : "";

  return `<div class="order-card st-${o.orderStatus || 'none'}${isNew ? ' is-new' : ''}">
    <div class="oc-top">
      <span class="oc-id">#${o.orderId}${newBadge}</span>
      <span class="oc-time">${date} ${time}</span>
    </div>
    ${statusBadge}
    ${d.location ? `<div class="oc-delivery">📍 ${esc(d.location)} · ${esc(d.name || "")} · ${esc(d.phone || "")}</div>` : ""}
    <div class="oc-summary">${esc(o.summary || "")}</div>
    <div class="${totalClass}">💰 ${o.total}.-</div>
    ${slip}
    ${actions}
  </div>`;
}

function toggleEta(orderId, minutes) {
  if (etaSel[orderId] === minutes) {
    delete etaSel[orderId];
  } else {
    etaSel[orderId] = minutes;
  }
  renderOrders();
}

async function confirmOrder(orderId) {
  if (!confirm(`ยืนยันว่าได้รับเงินออเดอร์ #${orderId} แล้ว?`)) return;
  try {
    const r = await api("/api/admin/confirm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId })
    });
    if (r.error) throw new Error(r.error);
    showToast(`ยืนยันรับเงิน #${orderId} แล้ว ✅`);
    loadOrders();
  } catch (e) { showToast(e.message, true); }
}

async function updateStatus(orderId, status) {
  const eta = etaSel[orderId] || 0;
  try {
    const r = await api("/api/admin/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId, status, eta })
    });
    if (r.error) throw new Error(r.error);
    showToast(`อัปเดต #${orderId} → ${STATUS_LABELS[status]}`);
    delete etaSel[orderId];
    loadOrders();
  } catch (e) { showToast(e.message, true); }
}

function showSlip(url) {
  document.getElementById("slip-img").src = url;
  document.getElementById("slip-modal").classList.add("show");
}

// ==================== Menu Management ====================

async function loadMenu() {
  const r = await api("/api/admin/menu");
  menuItems = r.items || [];
  renderMenu();
}

function renderMenu() {
  const el = document.getElementById("tab-menu");
  let html = `<button class="add-menu-btn" onclick="openMenuModal()">+ เพิ่มเมนูใหม่</button>`;
  if (!menuItems.length) {
    html += '<div class="empty">ยังไม่มีเมนูในฐานข้อมูล<br><small>เมนูจะใช้ค่า hardcoded จนกว่าจะเพิ่มเมนูใน DB</small></div>';
  } else {
    const grouped = {};
    for (const item of menuItems) {
      if (!grouped[item.cat]) grouped[item.cat] = [];
      grouped[item.cat].push(item);
    }
    for (const [cat, items] of Object.entries(grouped)) {
      html += `<h3 style="padding:8px 4px;font-size:15px;color:#5A4F00">${CAT_LABELS[cat] || cat}</h3>`;
      for (const item of items) {
        const priceText = Object.entries(item.price).map(([k,v]) => k === "default" ? `฿${v}` : `${k} ฿${v}`).join(" / ");
        const imgHtml = item.imageUrl ? `<img class="mc-img" src="${item.imageUrl}">` : "";
      html += `<div class="menu-card ${item.enabled ? '' : 'disabled'}">
          ${imgHtml}
          <div class="mc-left">
            <div class="mc-name">${esc(item.nameTh)} <small style="color:#888">${esc(item.nameEn)}</small></div>
            <div class="mc-price">${priceText}</div>
          </div>
          <div class="mc-actions">
            <button class="btn-toggle-menu" onclick="toggleMenuItem(${item.id})">${item.enabled ? '🔒 ปิด' : '🔓 เปิด'}</button>
            <button class="btn-edit-menu" onclick="editMenuItem(${item.id})">✏️</button>
            <button class="btn-del-menu" onclick="deleteMenuItem(${item.id})">🗑</button>
          </div>
        </div>`;
      }
    }
  }
  el.innerHTML = html;
}

let editingMenuId = null;
let menuPriceType = "single";
let menuLevelArr = [];
let menuImgFile = null;

const SPICY_LEVELS = ["เผ็ดน้อย", "เผ็ดปกติ", "เผ็ดมาก"];
const SWEET_LEVELS = ["หวานน้อย", "หวานปกติ", "หวานมาก"];

function setPriceType(type) {
  menuPriceType = type;
  document.getElementById("pt-single").classList.toggle("active", type === "single");
  document.getElementById("pt-variant").classList.toggle("active", type === "variant");
  document.getElementById("mf-price-single").style.display = type === "single" ? "" : "none";
  document.getElementById("mf-price-variant").style.display = type === "variant" ? "" : "none";
}

function moveRow(btn, dir) {
  const row = btn.closest(".price-row, .addon-row");
  const parent = row.parentElement;
  if (dir === -1 && row.previousElementSibling) parent.insertBefore(row, row.previousElementSibling);
  else if (dir === 1 && row.nextElementSibling) parent.insertBefore(row.nextElementSibling, row);
}

function addPriceRow(name, price) {
  const el = document.getElementById("mf-price-rows");
  const row = document.createElement("div");
  row.className = "price-row";
  row.innerHTML = `<div class="row-move-group"><button type="button" class="btn-row-move" onclick="moveRow(this,-1)">▲</button><button type="button" class="btn-row-move" onclick="moveRow(this,1)">▼</button></div><input type="text" placeholder="ชื่อ เช่น หมู" value="${esc(name || "")}"><input type="number" placeholder="ราคา" value="${price || ""}" style="width:80px;flex:none"><button type="button" class="btn-row-del" onclick="this.parentElement.remove()">✕</button>`;
  el.appendChild(row);
}

function addAddonRow(name, price) {
  const el = document.getElementById("mf-addon-rows");
  const row = document.createElement("div");
  row.className = "addon-row";
  row.innerHTML = `<div class="row-move-group"><button type="button" class="btn-row-move" onclick="moveRow(this,-1)">▲</button><button type="button" class="btn-row-move" onclick="moveRow(this,1)">▼</button></div><input type="text" placeholder="ชื่อ เช่น ไข่ดาว" value="${esc(name || "")}"><input type="number" placeholder="ราคา" value="${price || ""}" style="width:80px;flex:none"><button type="button" class="btn-row-del" onclick="this.parentElement.remove()">✕</button>`;
  el.appendChild(row);
}

function setLevelPreset(type) {
  if (type === "spicy") { menuLevelArr = [...SPICY_LEVELS]; document.getElementById("mf-levelLabel").value = "ระดับความเผ็ด"; }
  else if (type === "sweet") { menuLevelArr = [...SWEET_LEVELS]; document.getElementById("mf-levelLabel").value = "ระดับความหวาน"; }
  else { menuLevelArr = []; document.getElementById("mf-levelLabel").value = ""; }
  renderLevelTags();
}

function renderLevelTags() {
  const el = document.getElementById("mf-level-tags");
  if (!menuLevelArr.length) { el.textContent = "(ไม่มี)"; return; }
  el.textContent = menuLevelArr.join(" → ");
}

function previewMenuImg(input) {
  const file = input.files[0];
  if (!file) return;
  menuImgFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById("mf-img-preview");
    preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
}

function onCatChange() {
  const cat = document.getElementById("mf-cat").value;
  const isFood = cat === "food";
  const isCoffee = cat === "coffee";
  const isMilk = cat === "milk";

  // preset addons ตามหมวด
  document.getElementById("mf-addon-rows").innerHTML = "";
  if (isFood) {
    addAddonRow("ไข่ดาว", 15); addAddonRow("ไข่เจียว", 20); addAddonRow("พิเศษ", 20);
    setLevelPreset("spicy");
  } else if (isCoffee) {
    addAddonRow("น้ำผึ้ง", 10); addAddonRow("คาราเมลไซรัป", 10); addAddonRow("นมโอ๊ต", 20); addAddonRow("เพิ่มช็อต", 20);
    setLevelPreset("sweet");
  } else if (isMilk) {
    addAddonRow("น้ำผึ้ง", 10); addAddonRow("คาราเมลไซรัป", 10);
    setLevelPreset("sweet");
  } else {
    setLevelPreset("none");
  }
}

function openMenuModal(item) {
  editingMenuId = item ? item.id : null;
  menuImgFile = null;
  document.getElementById("mf-img-input").value = "";
  document.getElementById("menu-modal-title").textContent = item ? "✏️ แก้ไขเมนู" : "➕ เพิ่มเมนูใหม่";
  document.getElementById("mf-id").value = item ? item.id : "";
  document.getElementById("mf-id").disabled = !!item;
  document.getElementById("mf-cat").value = item ? item.cat : "food";
  document.getElementById("mf-nameTh").value = item ? item.nameTh : "";
  document.getElementById("mf-nameEn").value = item ? item.nameEn : "";
  document.getElementById("mf-sortOrder").value = item ? item.sortOrder : 0;
  document.getElementById("mf-enabled").value = item ? (item.enabled ? "1" : "0") : "1";

  // รูป
  const preview = document.getElementById("mf-img-preview");
  if (item && item.imageUrl) {
    preview.innerHTML = `<img src="${item.imageUrl}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    preview.innerHTML = `<span style="font-size:32px;color:#ccc">📷</span>`;
  }

  // ราคา
  if (item) {
    const keys = Object.keys(item.price);
    if (keys.length === 1 && keys[0] === "default") {
      setPriceType("single");
      document.getElementById("mf-price-default").value = item.price.default;
      document.getElementById("mf-price-rows").innerHTML = "";
    } else {
      setPriceType("variant");
      document.getElementById("mf-price-default").value = "";
      document.getElementById("mf-price-rows").innerHTML = "";
      for (const [k, v] of Object.entries(item.price)) addPriceRow(k, v);
    }
  } else {
    setPriceType("single");
    document.getElementById("mf-price-default").value = "";
    document.getElementById("mf-price-rows").innerHTML = "";
  }

  // Addons
  document.getElementById("mf-addon-rows").innerHTML = "";
  if (item && item.addons && item.addons.length) {
    for (const a of item.addons) addAddonRow(a.id, a.price);
  } else if (!item) {
    onCatChange();
    return document.getElementById("menu-modal").classList.add("show");
  }

  // Level
  if (item && item.level && item.level.length) {
    menuLevelArr = [...item.level];
    document.getElementById("mf-levelLabel").value = item.levelLabel || "";
  } else {
    menuLevelArr = [];
    document.getElementById("mf-levelLabel").value = "";
  }
  renderLevelTags();

  document.getElementById("menu-modal").classList.add("show");
}

function closeMenuModal() {
  document.getElementById("menu-modal").classList.remove("show");
}

function collectPrice() {
  if (menuPriceType === "single") {
    const v = parseInt(document.getElementById("mf-price-default").value);
    if (!v || v <= 0) throw new Error("กรุณากรอกราคา");
    return { default: v };
  }
  const rows = document.getElementById("mf-price-rows").querySelectorAll(".price-row");
  if (!rows.length) throw new Error("กรุณาเพิ่มราคาอย่างน้อย 1 ตัวเลือก");
  const price = {};
  for (const row of rows) {
    const inputs = row.querySelectorAll("input");
    const name = inputs[0].value.trim();
    const val = parseInt(inputs[1].value);
    if (!name || !val) throw new Error("กรุณากรอกชื่อและราคาให้ครบ");
    price[name] = val;
  }
  return price;
}

function collectAddons() {
  const rows = document.getElementById("mf-addon-rows").querySelectorAll(".addon-row");
  const addons = [];
  for (const row of rows) {
    const inputs = row.querySelectorAll("input");
    const name = inputs[0].value.trim();
    const val = parseInt(inputs[1].value);
    if (!name || !val) continue;
    addons.push({ id: name, price: val });
  }
  return addons;
}

async function uploadMenuImage(id) {
  if (!menuImgFile) return null;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const r = await api("/api/admin/menu-image/" + id, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: e.target.result })
        });
        if (r.error) throw new Error(r.error);
        resolve(r.imageUrl);
      } catch (err) { reject(err); }
    };
    reader.readAsDataURL(menuImgFile);
  });
}

async function saveMenu() {
  try {
    const item = {
      id: parseInt(document.getElementById("mf-id").value),
      cat: document.getElementById("mf-cat").value,
      nameTh: document.getElementById("mf-nameTh").value.trim(),
      nameEn: document.getElementById("mf-nameEn").value.trim(),
      price: collectPrice(),
      addons: collectAddons(),
      level: menuLevelArr,
      levelLabel: document.getElementById("mf-levelLabel").value.trim(),
      variantLabel: menuPriceType === "variant" ? document.getElementById("mf-levelLabel").value.trim() : "",
      sortOrder: parseInt(document.getElementById("mf-sortOrder").value) || 0,
      enabled: document.getElementById("mf-enabled").value === "1",
    };
    if (!item.id || !item.nameTh) throw new Error("กรุณากรอก ID และชื่อ");

    // อัปโหลดรูปก่อน (ถ้ามี)
    if (menuImgFile) {
      const url = await uploadMenuImage(item.id);
      if (url) item.imageUrl = url;
    } else {
      const existing = menuItems.find(m => m.id === item.id);
      if (existing) item.imageUrl = existing.imageUrl || "";
    }

    const r = await api("/api/admin/menu", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(item)
    });
    if (r.error) throw new Error(r.error);
    closeMenuModal();
    showToast("บันทึกเมนูแล้ว ✅");
    loadMenu();
  } catch (e) { showToast(e.message, true); }
}

function editMenuItem(id) {
  const item = menuItems.find(m => m.id === id);
  if (item) openMenuModal(item);
}

async function deleteMenuItem(id) {
  if (!confirm(`ลบเมนู #${id}?`)) return;
  try {
    const r = await api(`/api/admin/menu/${id}`, { method: "DELETE" });
    if (r.error) throw new Error(r.error);
    showToast("ลบเมนูแล้ว");
    loadMenu();
  } catch (e) { showToast(e.message, true); }
}

async function toggleMenuItem(id) {
  const item = menuItems.find(m => m.id === id);
  if (!item) return;
  item.enabled = !item.enabled;
  try {
    const r = await api("/api/admin/menu", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(item)
    });
    if (r.error) throw new Error(r.error);
    showToast(item.enabled ? "เปิดเมนูแล้ว" : "ปิดเมนูแล้ว");
    loadMenu();
  } catch (e) { showToast(e.message, true); }
}

// ==================== Utils ====================

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function showToast(msg, err) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (err ? " err" : "");
  setTimeout(() => el.classList.remove("show"), 2500);
}

setInterval(() => { if (curTab === "active") loadOrders(); }, 15000);

// ==================== Shop Status Toggles ====================

let shopStatus = { food: { open: true, manualClosed: false }, drinks: { open: true, manualClosed: false } };

async function loadShopStatus() {
  try {
    const r = await api("/api/admin/shop-status");
    shopStatus = r;
    renderShopToggles();
    document.getElementById("shop-toggles").style.display = "flex";
  } catch (e) {}
}

function renderShopToggles() {
  for (const sec of ["food", "drinks"]) {
    const btn = document.getElementById("toggle-" + sec);
    const s = shopStatus[sec];
    const label = sec === "food" ? "🍳 ครัว" : "☕ กาแฟ";
    if (s.manualClosed) {
      btn.className = "shop-toggle is-closed";
      btn.textContent = label + ": ปิดอยู่";
    } else {
      btn.className = "shop-toggle is-open";
      btn.textContent = label + ": เปิดอยู่";
    }
  }
}

async function toggleShop(section) {
  const current = shopStatus[section];
  const willClose = !current.manualClosed;
  const label = section === "food" ? "ครัว" : "กาแฟ/เครื่องดื่ม";
  if (!confirm(willClose ? `ปิด${label}เลยนะ?` : `เปิด${label}คืนนะ?`)) return;
  try {
    const r = await api("/api/admin/shop-status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ section, closed: willClose })
    });
    if (r.error) throw new Error(r.error);
    showToast(willClose ? `ปิด${label}แล้ว 🔴` : `เปิด${label}แล้ว 🟢`);
    loadShopStatus();
  } catch (e) { showToast(e.message, true); }
}

// ==================== Settings ====================
let settingsData = {};

async function loadSettingsTab() {
  try {
    settingsData = await api("/api/admin/settings");
    renderSettingsTab();
  } catch (e) { showToast("โหลดตั้งค่าไม่ได้: " + e.message, true); }
}

function renderSettingsTab() {
  const s = settingsData;
  let locs = [];
  try { locs = JSON.parse(s.delivery_locations || "[]"); } catch {}
  const locsHtml = locs.map((l, i) =>
    `<div class="sf-loc-item"><input value="${l.replace(/"/g,"&quot;")}" onchange="updateLoc(${i},this.value)"><button onclick="removeLoc(${i})">✕</button></div>`
  ).join("");

  document.getElementById("tab-settings").innerHTML = `
    <div class="settings-card">
      <h3>🏠 ข้อมูลร้าน</h3>
      <div class="sf-group"><label>ชื่อร้าน</label><input id="sf-shop_name" value="${(s.shop_name||"").replace(/"/g,"&quot;")}"></div>
      <div class="sf-group"><label>เบอร์โทร</label><input id="sf-shop_phone" value="${(s.shop_phone||"").replace(/"/g,"&quot;")}"></div>
      <div class="sf-group"><label>ลิงก์แผนที่</label><input id="sf-shop_map_url" value="${(s.shop_map_url||"").replace(/"/g,"&quot;")}"></div>
    </div>
    <div class="settings-card">
      <h3>🖼️ รูปภาพ</h3>
      <div class="sf-group">
        <label>โลโก้</label>
        <div class="sf-media-row">
          <img class="sf-media-preview" id="prev-logo" src="${s.logo_path||""}" onerror="this.style.display='none'">
          <input id="sf-logo_path" value="${(s.logo_path||"").replace(/"/g,"&quot;")}" style="flex:1">
          <label class="sf-upload-btn">📷<input type="file" accept="image/*" hidden onchange="uploadMedia('logo',this)"></label>
        </div>
      </div>
      <div class="sf-group">
        <label>QR PromptPay</label>
        <div class="sf-media-row">
          <img class="sf-media-preview" id="prev-qr" src="${s.qr_payment_path||""}" onerror="this.style.display='none'">
          <input id="sf-qr_payment_path" value="${(s.qr_payment_path||"").replace(/"/g,"&quot;")}" style="flex:1">
          <label class="sf-upload-btn">📷<input type="file" accept="image/*" hidden onchange="uploadMedia('qr_payment',this)"></label>
        </div>
      </div>
    </div>
    <div class="settings-card">
      <h3>🕐 เวลาเปิด-ปิด</h3>
      <div class="sf-row">
        <div class="sf-group"><label>อาหาร เปิด (ชม.)</label><input type="number" min="0" max="24" id="sf-food_open_hour" value="${s.food_open_hour||"16"}"></div>
        <div class="sf-group"><label>อาหาร ปิด (ชม.)</label><input type="number" min="0" max="24" id="sf-food_close_hour" value="${s.food_close_hour||"24"}"></div>
      </div>
      <div class="sf-row">
        <div class="sf-group"><label>เครื่องดื่ม เปิด (ชม.)</label><input type="number" min="0" max="24" id="sf-drinks_open_hour" value="${s.drinks_open_hour||"12"}"></div>
        <div class="sf-group"><label>เครื่องดื่ม ปิด (ชม.)</label><input type="number" min="0" max="24" id="sf-drinks_close_hour" value="${s.drinks_close_hour||"24"}"></div>
      </div>
    </div>
    <div class="settings-card">
      <h3>📍 สถานที่จัดส่ง</h3>
      <div id="sf-locations">${locsHtml}</div>
      <button class="sf-add-loc" onclick="addLoc()">+ เพิ่มสถานที่</button>
    </div>
    <div class="settings-card">
      <h3>🎨 สีธีม</h3>
      <div class="sf-row">
        <div class="sf-group"><label>สีหลัก <span class="sf-color-preview" id="cp-primary" style="background:${s.theme_primary||"#5A4F00"}"></span></label><input id="sf-theme_primary" value="${s.theme_primary||"#5A4F00"}" oninput="document.getElementById('cp-primary').style.background=this.value"></div>
        <div class="sf-group"><label>สีเน้น <span class="sf-color-preview" id="cp-accent" style="background:${s.theme_accent||"#F9E84A"}"></span></label><input id="sf-theme_accent" value="${s.theme_accent||"#F9E84A"}" oninput="document.getElementById('cp-accent').style.background=this.value"></div>
      </div>
      <div class="sf-row">
        <div class="sf-group"><label>สีพื้นหลัง <span class="sf-color-preview" id="cp-bg" style="background:${s.theme_bg||"#FFFEF5"}"></span></label><input id="sf-theme_bg" value="${s.theme_bg||"#FFFEF5"}" oninput="document.getElementById('cp-bg').style.background=this.value"></div>
        <div class="sf-group"><label>สีสำเร็จ <span class="sf-color-preview" id="cp-success" style="background:${s.theme_success||"#27AE60"}"></span></label><input id="sf-theme_success" value="${s.theme_success||"#27AE60"}" oninput="document.getElementById('cp-success').style.background=this.value"></div>
      </div>
    </div>
    <div class="settings-card">
      <h3>⚙️ อื่นๆ</h3>
      <div class="sf-group"><label>ETA เริ่มต้น (นาที)</label><input type="number" min="1" max="120" id="sf-default_eta_minutes" value="${s.default_eta_minutes||"20"}"></div>
    </div>
    <button class="btn-save-settings" onclick="saveSettings()">💾 บันทึกตั้งค่า</button>
  `;
}

function getSettingsLocs() {
  const items = document.querySelectorAll("#sf-locations .sf-loc-item input");
  return Array.from(items).map(i => i.value.trim()).filter(Boolean);
}

function updateLoc(idx, val) {
  const locs = getSettingsLocs();
  locs[idx] = val;
  settingsData.delivery_locations = JSON.stringify(locs);
}

function removeLoc(idx) {
  const locs = getSettingsLocs();
  locs.splice(idx, 1);
  settingsData.delivery_locations = JSON.stringify(locs);
  renderSettingsTab();
}

function addLoc() {
  const locs = getSettingsLocs();
  locs.push("");
  settingsData.delivery_locations = JSON.stringify(locs);
  renderSettingsTab();
  const inputs = document.querySelectorAll("#sf-locations .sf-loc-item input");
  if (inputs.length) inputs[inputs.length - 1].focus();
}

async function uploadMedia(type, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) return showToast("ไฟล์ใหญ่เกิน 4MB", true);
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const r = await api("/api/admin/media/" + type, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: reader.result })
      });
      if (r.error) throw new Error(r.error);
      const keyMap = { logo: "logo_path", qr_payment: "qr_payment_path", banner: "banner_path" };
      const inputEl = document.getElementById("sf-" + keyMap[type]);
      if (inputEl) inputEl.value = r.path;
      const prevMap = { logo: "prev-logo", qr_payment: "prev-qr" };
      const prev = document.getElementById(prevMap[type]);
      if (prev) { prev.src = r.path; prev.style.display = ""; }
      showToast("อัปโหลดสำเร็จ ✅");
    } catch (e) { showToast("อัปโหลดไม่ได้: " + e.message, true); }
  };
  reader.readAsDataURL(file);
}

async function saveSettings() {
  const fields = ["shop_name","shop_phone","shop_map_url","logo_path","qr_payment_path",
    "food_open_hour","food_close_hour","drinks_open_hour","drinks_close_hour",
    "theme_primary","theme_accent","theme_bg","theme_success","default_eta_minutes"];
  const updates = {};
  for (const f of fields) {
    const el = document.getElementById("sf-" + f);
    if (el) updates[f] = el.value.trim();
  }
  updates.delivery_locations = JSON.stringify(getSettingsLocs());
  try {
    const r = await api("/api/admin/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(updates)
    });
    if (r.error) throw new Error(r.error);
    settingsData = r.settings || updates;
    showToast("บันทึกตั้งค่าแล้ว ✅");
  } catch (e) { showToast("บันทึกไม่ได้: " + e.message, true); }
}

// Init
if (TOKEN) startDashboard();

// Check URL param
const urlToken = new URLSearchParams(location.search).get("token");
if (urlToken) { TOKEN = urlToken; localStorage.setItem("mgr_admin_token", urlToken); primeAudio(); startDashboard(); }
</script>
</body>
</html>
